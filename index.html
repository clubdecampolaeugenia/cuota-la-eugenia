<script>
fetch("https://script.google.com/macros/s/AKfycbz5gcfgjTNLm94jSdSGcVCiM8WP2673S1cGj9uCCq6XehVlLLJ2Q9OgPaVaSNrvceE7/exec?json=1")
.then(res => res.text())
.then(text => {
  try {
    const data = JSON.parse(text);

    document.getElementById("titulo").innerText = data.titulo;
    document.getElementById("lote").innerText = data.lote;
    document.getElementById("adicional").innerText = data.adicional;
    document.getElementById("actualizacion").innerText = data.actualizacion;
  } catch (e) {
    document.getElementById("titulo").innerText = "Error cargando datos";
  }
});
</script>
