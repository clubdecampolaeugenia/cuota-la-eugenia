<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d6663">
  <link rel="apple-touch-icon" href="https://i.imgur.com/yh6pPzw.png">
  <link rel="icon" type="image/png" href="https://i.imgur.com/yh6pPzw.png">
  <title>Cuota vigente</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0d6663; font-family: 'Roboto', sans-serif; padding: 20px; }
    .card { width: 100%; max-width: 430px; background: #c4df57; color: #003a6b; border-radius: 24px; padding: 22px 20px; text-align: center; box-sizing: border-box; }
    .logo-wrap img { width: 180px; height: auto; display: block; margin: auto; }
    h1 { margin: 8px 0 0; color: #000000; font-family: Impact, sans-serif; font-size: 34px; line-height: 0.95; letter-spacing: 1px; text-transform: uppercase; }
    @media (max-width: 380px) { h1 { font-size: 28px; } .amount { font-size: 17px !important; } }
    .dato { background: #edf1dc; border-radius: 14px; padding: 12px; margin: 12px 0; }
    .dato-titulo { color: #003a6b; font-size: 14px; font-weight: 900; text-transform: uppercase; }
    .amount { margin-top: 4px; color: #003a6b; font-size: 20px; font-weight: 900; }
    .copyBtn { margin-top: 16px; display: block; width: 100%; text-decoration: none; padding: 14px; border-radius: 24px; background: transparent; border: 2px solid #0d6663; color: #0d6663; font-size: 15px; font-weight: 900; text-align: center; text-transform: uppercase; }
    .backButton { margin-top: 14px; display: block; width: 100%; text-decoration: none; padding: 14px; border-radius: 24px; background: #0d6663; color: #c4df57; font-size: 15px; font-weight: 900; text-align: center; text-transform: uppercase; }
    .footer { margin-top: 16px; font-size: 12px; color: #003a6b; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="https://i.imgur.com/yh6pPzw.png" alt="Logo La Eugenia">
    </div>
    <h1 id="titulo">Cargando...</h1>
    <div class="dato">
      <div class="dato-titulo">Cuota Lote</div>
      <div class="amount" id="lote"></div>
    </div>
    <div class="dato">
      <div class="dato-titulo">Adicional</div>
      <div class="amount" id="adicional"></div>
    </div>
    <a class="copyBtn" href="https://clubdecampolaeugenia.github.io/copiar-alias/">Copiar alias de La Eugenia</a>
    <a class="backButton" href="https://clubdecampolaeugenia.taplink.site/">Ir al Centro de Gestión Vecinal</a>
    <div class="footer" id="actualizacion"></div>
  </div>
  <script>
    const DATA_URL = "https://script.google.com/macros/s/AKfycbz5gcfgjTNLm94jSdSGcVCiM8WP2673S1cGj9uCCq6XehVlLLJ2Q9OgPaVaSNrvceE7/exec";
    fetch(DATA_URL)
      .then(res => res.text())
      .then(text => {
        const p = text.split("|");
        document.getElementById("titulo").innerText = p[0] || "";
        document.getElementById("lote").innerText = p[1] || "";
        document.getElementById("adicional").innerText = p[2] || "";
        document.getElementById("actualizacion").innerText = p[3] || "";
      })
      .catch(() => { document.getElementById("titulo").innerText = "Error cargando datos"; });
  </script>
</body>
</html>
