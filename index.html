<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuota vigente</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f5d5b;
  font-family: Arial, sans-serif;
  padding: 18px;
}

.card {
  width: min(92vw, 430px);
  background: #bfdc63;
  color: #0f3f54;
  border-radius: 28px;
  padding: 28px 18px 22px;
  text-align: center;
  box-shadow: 0 14px 34px rgba(0,0,0,0.18);
}

.title {
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 22px;
}

.amount {
  font-size: 28px;
  font-weight: 700;
  margin: 10px 0;
  letter-spacing: 0.3px;
}

.copyBtn {
  margin-top: 22px;
  display: inline-block;
  width: 100%;
  text-decoration: none;
  padding: 14px;
  border-radius: 999px;
  background: transparent;
  border: 2px solid #0f5d5b;
  color: #0f3f54;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
}

.backButton {
  margin-top: 14px;
  display: inline-block;
  width: 100%;
  text-decoration: none;
  padding: 14px;
  border-radius: 999px;
  background: #0f5d5b;
  color: #bfdc63;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
}

.footer {
  margin-top: 18px;
  font-size: 13px;
  color: #23485a;
}

@media (max-width: 480px) {
  .title {
    font-size: 30px;
  }

  .amount {
    font-size: 26px;
  }

  .copyBtn,
  .backButton {
    font-size: 17px;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="title" id="titulo">Cargando...</div>

  <div class="amount" id="lote"></div>
  <div class="amount" id="adicional"></div>

  <a class="copyBtn" href="https://clubdecampolaeugenia.github.io/copiar-alias/">
    COPIAR ALIAS DE LA EUGENIA
  </a>

  <a class="backButton" href="https://clubdecampolaeugenia.taplink.site/">
    VOLVER AHORA
  </a>

  <div class="footer" id="actualizacion"></div>

</div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbz5gcfgjTNLm94jSdSGcVCiM8WP2673S1cGj9uCCq6XehVlLLJ2Q9OgPaVaSNrvceE7/exec";

fetch(DATA_URL)
  .then(res => res.text())
  .then(text => {
    const p = text.split("|");

    document.getElementById("titulo").innerText = p[0] || "";
    document.getElementById("lote").innerText = p[1] || "";
    document.getElementById("adicional").innerText = p[2] || "";
    document.getElementById("actualizacion").innerText = p[3] || "";
  })
  .catch(() => {
    document.getElementById("titulo").innerText = "Error cargando datos";
    document.getElementById("lote").innerText = "";
    document.getElementById("adicional").innerText = "";
    document.getElementById("actualizacion").innerText = "";
  });
</script>

</body>
</html>
