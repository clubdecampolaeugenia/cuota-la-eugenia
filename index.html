<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuota vigente</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f5d5b;
  font-family: Arial, sans-serif;
  padding: 18px;
}

.card {
  width: min(92vw, 430px);
  background: #bfdc63;
  color: #0f3f54;
  border-radius: 28px;
  padding: 28px 18px 22px;
  text-align: center;
  box-shadow: 0 14px 34px rgba(0,0,0,0.18);
}

.title {
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 18px;
}

.value {
  font-size: 22px;
  margin: 8px 0;
  font-weight: 600;
}

.footer {
  margin-top: 16px;
  font-size: 13px;
  color: #23485a;
}

/* BOTÓN TIPO TAPLINK */
.taplinkBtn {
  width: 100%;
  border-radius: 999px;
  border: 2px solid #0f5d5b;
  background: #bfdc63;
  padding: 14px 14px;
  margin-top: 16px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: #0f3f54;
}

.icon {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  border: 2px solid #0f5d5b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
}

.btnText {
  flex: 1;
}

.btnTitle {
  font-size: 15px;
  font-weight: 700;
}

.btnSub {
  font-size: 12px;
  opacity: 0.8;
}

/* BOTÓN VOLVER */
.backButton {
  margin-top: 14px;
  display: inline-block;
  width: 100%;
  text-decoration: none;
  padding: 14px;
  border-radius: 999px;
  background: #0f5d5b;
  color: #bfdc63;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">

  <div class="title" id="titulo">Cargando...</div>

  <div class="value" id="lote"></div>
  <div class="value" id="adicional"></div>

  <!-- BOTÓN COPIAR (usa tu sistema ya probado) -->
  <a class="taplinkBtn" href="https://clubdecampolaeugenia.github.io/copiar-alias/">
    <div class="icon">💲</div>
    <div class="btnText">
      <div class="btnTitle">COPIAR ALIAS DE LA EUGENIA</div>
      <div class="btnSub">Copiar alias automáticamente</div>
    </div>
  </a>

  <!-- VOLVER -->
  <a class="backButton" href="https://clubdecampolaeugenia.taplink.site/">
    VOLVER AHORA
  </a>

  <div class="footer" id="actualizacion"></div>

</div>

<script>

const DATA_URL = "https://script.google.com/macros/s/AKfycbz5gcfgjTNLm94jSdSGcVCiM8WP2673S1cGj9uCCq6XehVlLLJ2Q9OgPaVaSNrvceE7/exec";

fetch(DATA_URL)
.then(res => res.text())
.then(text => {
  const p = text.split("|");

  document.getElementById("titulo").innerText = p[0] || "";
  document.getElementById("lote").innerText = p[1] || "";
  document.getElementById("adicional").innerText = p[2] || "";
  document.getElementById("actualizacion").innerText = p[3] || "";
})
.catch(() => {
  document.getElementById("titulo").innerText = "Error cargando datos";
});

</script>

</body>
</html>
